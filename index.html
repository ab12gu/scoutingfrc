<h1>Match Scouting Poll</h1>

<p>Use the buttons to track values. This data is only kept in the browser and is not saved.</p>

<div class="poll">
  <div class="poll-row">
    <span class="poll-label">Balls scored</span>
    <button type="button" class="decrement" data-key="balls">-</button>
    <span class="poll-value" id="balls">0</span>
    <button type="button" class="increment" data-key="balls">+</button>
  </div>

  <div class="poll-row">
    <span class="poll-label">Rough percentage made</span>
    <button type="button" class="decrement" data-key="rough">-</button>
    <span class="poll-value" id="rough">0</span>
    <button type="button" class="increment" data-key="rough">+</button>
  </div>

  <div class="poll-row">
    <span class="poll-label">Climb</span>
    <button type="button" class="decrement" data-key="climb">-</button>
    <span class="poll-value" id="climb">0</span>
    <button type="button" class="increment" data-key="climb">+</button>
  </div>

  <div class="poll-row">
    <span class="poll-label">Auto path</span>
    <button type="button" class="decrement" data-key="auto">-</button>
    <span class="poll-value" id="auto">0</span>
    <button type="button" class="increment" data-key="auto">+</button>
  </div>

  <div class="poll-row">
    <span class="poll-label">Trench (Y/N)</span>
    <button type="button" class="toggle" data-key="trench">Toggle</button>
    <span class="poll-value" id="trench">No</span>
  </div>

  <div class="poll-row">
    <span class="poll-label">Pick up spot?</span>
    <button type="button" class="toggle" data-key="pickup">Toggle</button>
    <span class="poll-value" id="pickup">No</span>
  </div>

  <div class="poll-row">
    <span class="poll-label">Shoot on move</span>
    <button type="button" class="toggle" data-key="shoot">Toggle</button>
    <span class="poll-value" id="shoot">No</span>
  </div>

  <div class="poll-row">
    <span class="poll-label">Storage capacity</span>
    <button type="button" class="decrement" data-key="storage">-</button>
    <span class="poll-value" id="storage">0</span>
    <button type="button" class="increment" data-key="storage">+</button>
  </div>
</div>

<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 2rem; }
  h1 { margin-bottom: 0.5rem; }
  .poll { max-width: 520px; }
  .poll-row { display: flex; align-items: center; gap: 0.5rem; margin: 0.5rem 0; }
  .poll-label { flex: 1; }
  .poll-value { min-width: 2.5rem; text-align: center; font-weight: bold; }
  button { padding: 0.3rem 0.6rem; border-radius: 4px; border: 1px solid #444; background: #f0f0f0; cursor: pointer; }
  button:hover { background: #e0e0e0; }
</style>

<script>
  const state = {
    balls: 0,
    rough: 0,
    climb: 0,
    auto: 0,
    trench: false,
    pickup: false,
    shoot: false,
    storage: 0,
  };

  function updateDisplay(key) {
    const el = document.getElementById(key);
    if (!el) return;
    const value = state[key];
    if (typeof value === 'boolean') {
      el.textContent = value ? 'Yes' : 'No';
    } else {
      el.textContent = value;
    }
  }

  function clampNumber(value) {
    return Math.max(0, value);
  }

  document.addEventListener('click', (event) => {
    const button = event.target.closest('button');
    if (!button) return;

    const key = button.dataset.key;
    if (!key) return;

    if (button.classList.contains('increment')) {
      state[key] = clampNumber(state[key] + 1);
    } else if (button.classList.contains('decrement')) {
      state[key] = clampNumber(state[key] - 1);
    } else if (button.classList.contains('toggle')) {
      state[key] = !state[key];
    }

    updateDisplay(key);
  });
</script>
