<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FRC Scouting</title>
    <link rel="stylesheet" href="/static/style.css?v=50">
    <link rel="icon" type="image/x-icon" href="/static/images/scout-blue-skyblue.png">
  </head>

  <body>
    <main>
      <header class="main-header">
        <img class="app-logo" src="/static/images/4682-v2.png" alt="FRC Logo" />
        <h1>FRC Scouting</h1>
      </header>

      <div class="match-info">
        <div class="input-row">
          <label for="your-name">Your Name: <span class="required-asterisk">*</span></label>
          <input type="text" id="your-name" placeholder="e.g. Gavin">
        </div>
        <div class="input-row">
          <label for="team-number">Team Number: <span class="required-asterisk">*</span></label>
          <input type="text" id="team-number" placeholder="e.g. 360">
        </div>
        <div class="input-row">
          <label for="match-number">Match Number: <span class="required-asterisk">*</span></label>
          <input type="text" id="match-number" placeholder="e.g. 67">
        </div>
      </div>

      <div class="poll">
        <div class="poll-row climb-row">
          <span class="poll-label">Is the robot on the field? <span class="required-asterisk">*</span></span>
          <div class="climb-buttons">
            <button type="button" class="toggle-option" data-key="robotOnField" data-value="true">Yes</button>
            <button type="button" class="toggle-option" data-key="robotOnField" data-value="false">No</button>
          </div>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Which side does robot start on? <span class="required-asterisk">*</span></span>
          <div class="climb-buttons">
            <button type="button" class="robot-start-option" data-value="B1">B1</button>
            <button type="button" class="robot-start-option" data-value="B2">B2</button>
            <button type="button" class="robot-start-option" data-value="B3">B3</button>
          </div>
          <div class="climb-buttons">
            <button type="button" class="robot-start-option" data-value="R1">R1</button>
            <button type="button" class="robot-start-option" data-value="R2">R2</button>
            <button type="button" class="robot-start-option" data-value="R3">R3</button>
            <button type="button" class="robot-start-option" data-value="N/A">N/A</button>
          </div>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Auto Balls Scored (exact number) <span class="required-asterisk">*</span></span>
          <input type="number" id="autoBallsScored" class="poll-input" placeholder="0" min="0" max="200">
          <button type="button" class="auto-balls-na-option" data-value="N/A">N/A</button>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Auto climb <span class="required-asterisk">*</span></span>
          <div class="climb-buttons">
            <button type="button" class="autoClimb-option" data-value="1">1</button>
            <button type="button" class="autoClimb-option" data-value="2">2</button>
            <button type="button" class="autoClimb-option" data-value="3">3</button>
            <button type="button" class="autoClimb-option" data-value="Park">Park</button>
            <button type="button" class="autoClimb-option" data-value="No">No</button>
            <button type="button" class="autoClimb-option" data-value="N/A">N/A</button>
          </div>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Teleop Balls Scored <span class="required-asterisk">*</span></span>
          <div class="climb-buttons">
            <button type="button" class="teleop-balls-option" data-value="0">0</button>
            <button type="button" class="teleop-balls-option" data-value="10">10</button>
            <button type="button" class="teleop-balls-option" data-value="20">20</button>
            <button type="button" class="teleop-balls-option" data-value="30">30</button>
            <button type="button" class="teleop-balls-option" data-value="40">40</button>
            <button type="button" class="teleop-balls-option" data-value="50">50</button>
            <button type="button" class="teleop-balls-option" data-value="60">60</button>
            <button type="button" class="teleop-balls-option" data-value="70">70</button>
            <button type="button" class="teleop-balls-option" data-value="80">80</button>
            <button type="button" class="teleop-balls-option" data-value="90">90</button>
            <button type="button" class="teleop-balls-option" data-value="100">100</button>
            <button type="button" class="teleop-balls-option" data-value="110">110</button>
            <button type="button" class="teleop-balls-option" data-value="120">120</button>
            <button type="button" class="teleop-balls-option" data-value="130">130</button>
            <button type="button" class="teleop-balls-option" data-value="140">140</button>
            <button type="button" class="teleop-balls-option" data-value="150">150</button>
            <button type="button" class="teleop-balls-option" data-value="N/A">N/A</button>
          </div>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Climb <span class="required-asterisk">*</span></span>
          <div class="climb-buttons">
            <button type="button" class="climb-option" data-value="1">1</button>
            <button type="button" class="climb-option" data-value="2">2</button>
            <button type="button" class="climb-option" data-value="3">3</button>
            <button type="button" class="climb-option" data-value="Park">Park</button>
            <button type="button" class="climb-option" data-value="No">No</button>
            <button type="button" class="climb-option" data-value="N/A">N/A</button>
          </div>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Can go under trench? <span class="required-asterisk">*</span></span>
          <div class="climb-buttons">
            <button type="button" class="toggle-option" data-key="trench" data-value="true">Yes</button>
            <button type="button" class="toggle-option" data-key="trench" data-value="false">No</button>
            <button type="button" class="toggle-option" data-key="trench" data-value="N/A">N/A</button>
          </div>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Pick up from floor? <span class="required-asterisk">*</span></span>
          <div class="climb-buttons">
            <button type="button" class="toggle-option" data-key="pickupFloor" data-value="true">Yes</button>
            <button type="button" class="toggle-option" data-key="pickupFloor" data-value="false">No</button>
            <button type="button" class="toggle-option" data-key="pickupFloor" data-value="N/A">N/A</button>
          </div>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Pick up from human player station? <span class="required-asterisk">*</span></span>
          <div class="climb-buttons">
            <button type="button" class="toggle-option" data-key="pickupHuman" data-value="true">Yes</button>
            <button type="button" class="toggle-option" data-key="pickupHuman" data-value="false">No</button>
            <button type="button" class="toggle-option" data-key="pickupHuman" data-value="N/A">N/A</button>
          </div>
        </div>

        <div class="poll-row climb-row">

          <span class="poll-label">Storage capacity <span class="required-asterisk">*</span></span>
          <div class="climb-buttons">
            <button type="button" class="approx-storage-option" data-value="0">0</button>
            <button type="button" class="approx-storage-option" data-value="5">5</button>
            <button type="button" class="approx-storage-option" data-value="10">10</button>
            <button type="button" class="approx-storage-option" data-value="20">20</button>
            <button type="button" class="approx-storage-option" data-value="30">30</button>
            <button type="button" class="approx-storage-option" data-value="40">40</button>
            <button type="button" class="approx-storage-option" data-value="50+">50+</button>
            <button type="button" class="approx-storage-option" data-value="N/A">N/A</button>
          </div>
        </div>
      </div>

      <div class="notes-section">
        <label for="notes">Additional notes:</label>
        <textarea id="notes" placeholder="Add any additional notes about the robot's performance"></textarea>
      </div>

      <div class="submit-section">
        <button type="button" id="submit-btn">Submit Data</button>
      </div>
    </main>

    <script>
      const state = {
        name: '',
        teamNumber: '',
        matchNumber: '',
        robotOnField: true,
        robotStartSide: 'B1',
        autoScore: 0,
        autoClimb: 'No',
        autoBallsScore: 0,
        balls: 0,
        telepopBallsScore: 0,
        climb: 'No',
        trench: false,
        pickupFloor: false,
        pickupHuman: false,
        shoot: false,
        approxStorage: '0',
        notes: '',
      };

      function updateDisplay(key) {
        const el = document.getElementById(key);
        const input = document.getElementById(key + '-input');
        const value = state[key];
        
        // Update toggle option button styles (for all boolean fields)
        if (key === 'robotOnField' || key === 'trench' || key === 'pickupFloor' || key === 'pickupHuman' || key === 'shoot') {
          document.querySelectorAll(`.toggle-option[data-key="${key}"]`).forEach(btn => {
            btn.classList.remove('active');
            if (value === 'N/A') {
              if (btn.dataset.value === 'N/A') {
                btn.classList.add('active');
              }
            } else if (value === true && btn.dataset.value === 'true') {
              btn.classList.add('active');
            } else if (value === false && btn.dataset.value === 'false') {
              btn.classList.add('active');
            }
          });
        }
        
        if (typeof value === 'boolean' || value === 'N/A') {
          if (el) {
            if (value === 'N/A') {
              el.textContent = 'N/A';
            } else {
              el.textContent = value ? 'Yes' : 'No';
            }
          }
        } else {
          if (el) {
            el.textContent = value;
          }
          if (input) {
            input.value = value;
          }
        }
        // Update climb button styles
        if (key === 'climb') {
          document.querySelectorAll('.climb-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.value === value);
          });
        }
        // Update autoClimb button styles
        if (key === 'autoClimb') {
          document.querySelectorAll('.autoClimb-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.value === value);
          });
        }
        // Update robot start side button styles
        if (key === 'robotStartSide') {
          document.querySelectorAll('.robot-start-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.value === value);
          });
        }
        // Update auto balls score input and N/A button
        if (key === 'autoBallsScore') {
          const input = document.getElementById('autoBallsScored');
          const naBtn = document.querySelector('.auto-balls-na-option');
          if (value === 'N/A') {
            input.value = '';
            naBtn.classList.add('active');
          } else {
            input.value = value;
            naBtn.classList.remove('active');
          }
        }
        // Update teleop balls score button styles
        if (key === 'telepopBallsScore') {
          document.querySelectorAll('.teleop-balls-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.value === String(value));
          });
        }
        // Update approx storage option button styles
        if (key === 'approxStorage') {
          document.querySelectorAll('.approx-storage-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.value === value);
          });
          if (el) {
            el.textContent = value;
          }
        }
      }

      function clampNumber(value, key) {
        return Math.max(0, value);
      }

      document.getElementById('your-name').addEventListener('input', (e) => {
        state.name = e.target.value;
      });

      document.getElementById('team-number').addEventListener('input', (e) => {
        state.teamNumber = e.target.value;
      });

      document.getElementById('match-number').addEventListener('input', (e) => {
        state.matchNumber = e.target.value;
      });

      document.getElementById('notes').addEventListener('input', (e) => {
        state.notes = e.target.value;
      });

      document.getElementById('autoBallsScored').addEventListener('input', (e) => {
        const value = e.target.value.trim();
        if (value === '') {
          state.autoBallsScore = 0;
        } else {
          state.autoBallsScore = Math.max(0, parseInt(value) || 0);
        }
      });

      document.querySelectorAll('.poll-input').forEach(input => {
        input.addEventListener('change', (e) => {
          const key = e.target.dataset.key;
          const value = parseInt(e.target.value) || 0;
          state[key] = Math.max(0, value);
          updateDisplay(key);
        });
        input.addEventListener('input', (e) => {
          const key = e.target.dataset.key;
          const value = parseInt(e.target.value) || 0;
          state[key] = Math.max(0, value);
          updateDisplay(key);
        });
      });

      document.addEventListener('change', (event) => {
        const checkbox = event.target;
        if (checkbox.classList.contains('toggle-checkbox')) {
          const key = checkbox.dataset.key;
          state[key] = checkbox.checked;
          updateDisplay(key);
        }
      });

      document.addEventListener('click', (event) => {
        const button = event.target.closest('button');
        if (!button) return;

        if (button.classList.contains('toggle-option')) {
          const key = button.dataset.key;
          let value;
          if (button.dataset.value === 'N/A') {
            value = 'N/A';
          } else {
            value = button.dataset.value === 'true';
          }
          state[key] = value;
          updateDisplay(key);
          
          // If robot is not on field, auto-select N/A for all options
          if (key === 'robotOnField' && value === false) {
            state.robotStartSide = 'N/A';
            state.autoBallsScore = 'N/A';
            state.autoClimb = 'N/A';
            state.telepopBallsScore = 'N/A';
            state.climb = 'N/A';
            state.trench = 'N/A';
            state.pickupFloor = 'N/A';
            state.pickupHuman = 'N/A';
            state.shoot = 'N/A';
            state.approxStorage = 'N/A';
            
            updateDisplay('robotStartSide');
            updateDisplay('autoBallsScore');
            updateDisplay('autoClimb');
            updateDisplay('telepopBallsScore');

            updateDisplay('climb');
            updateDisplay('trench');
            updateDisplay('pickupFloor');
            updateDisplay('pickupHuman');
            updateDisplay('shoot');
            updateDisplay('approxStorage');
          } else if (key === 'robotOnField' && value === true) {
            // If robot is on field, clear all selections
            state.robotStartSide = '';
            state.autoBallsScore = 0;
            state.autoClimb = '';
            state.telepopBallsScore = 0;
            state.climb = '';
            state.trench = '';
            state.pickupFloor = '';
            state.pickupHuman = '';
            state.shoot = '';
            state.approxStorage = '';
            
            updateDisplay('robotStartSide');
            updateDisplay('autoBallsScore');
            updateDisplay('autoClimb');
            updateDisplay('telepopBallsScore');
            updateDisplay('climb');
            updateDisplay('trench');
            updateDisplay('pickupFloor');
            updateDisplay('pickupHuman');
            updateDisplay('shoot');
            updateDisplay('approxStorage');
          }
          return;
        }

        if (button.classList.contains('auto-balls-na-option')) {
          if (button.dataset.value === 'N/A') {
            state.autoBallsScore = 'N/A';
            document.getElementById('autoBallsScored').value = '';
            button.classList.add('active');
          }
          return;
        }

        if (button.classList.contains('climb-option')) {
          state.climb = button.dataset.value;
          updateDisplay('climb');
          return;
        }

        if (button.classList.contains('autoClimb-option')) {
          state.autoClimb = button.dataset.value;
          updateDisplay('autoClimb');
          return;
        }

        if (button.classList.contains('robot-start-option')) {
          state.robotStartSide = button.dataset.value;
          updateDisplay('robotStartSide');
          return;
        }

        if (button.classList.contains('teleop-balls-option')) {
          if (button.dataset.value === 'N/A') {
            state.telepopBallsScore = 'N/A';
          } else {
            state.telepopBallsScore = parseInt(button.dataset.value) || 0;
          }
          updateDisplay('telepopBallsScore');
          return;
        }

        if (button.classList.contains('approx-storage-option')) {
          state.approxStorage = button.dataset.value;
          updateDisplay('approxStorage');
          return;
        }

        const key = button.dataset.key;
        if (!key) return;

        if (button.classList.contains('increment')) {
          state[key] = clampNumber(state[key] + 1, key);
        } else if (button.classList.contains('decrement')) {
          state[key] = clampNumber(state[key] - 1, key);
        }

        updateDisplay(key);
      });

      function validateForm() {
        const errors = [];

        // Check text inputs
        if (!state.name || state.name.trim() === '') {
          errors.push('Your Name is required');
        }
        if (!state.teamNumber || state.teamNumber.trim() === '') {
          errors.push('Team Number is required');
        }
        if (!state.matchNumber || state.matchNumber.trim() === '') {
          errors.push('Match Number is required');
        }

        // Check selection fields
        const autoBallsInput = document.getElementById('autoBallsScored').value.trim();
        if (autoBallsInput === '' && state.autoBallsScore !== 'N/A') {
          errors.push('Auto Balls Scored is required');
        }
        if (state.approxStorage === '0') {
          errors.push('Storage capacity must be selected');
        }

        return errors;
      }

      document.getElementById('submit-btn').addEventListener('click', () => {
        const validationErrors = validateForm();
        
        if (validationErrors.length > 0) {
          alert('Form is incomplete:\n\n' + validationErrors.join('\n'));
          return;
        }

        // Disable form during submission
        const submitBtn = document.getElementById('submit-btn');
        const originalBtnText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';
        
        // Disable all inputs and buttons while submitting
        const allInputs = document.querySelectorAll('input, button:not(#submit-btn)');
        allInputs.forEach(el => el.disabled = true);

        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwELMK6enk3vwtbK0QfrG1EHVJ-N1YTmXW5fXCGzAkfzX_c_IQ107APv3nvwxNcc5Pc/exec';
        
        // Build submission object in UI order
        const dataToSubmit = {
          name: state.name,
          teamNumber: state.teamNumber,
          matchNumber: state.matchNumber,
          robotOnField: state.robotOnField === 'N/A' ? 'N/A' : (state.robotOnField ? 'Yes' : 'No'),
          robotStartSide: state.robotStartSide,
          autoBallsScore: state.autoBallsScore,
          autoClimb: state.autoClimb,
          telepopBallsScore: state.telepopBallsScore,
          climb: state.climb,
          trench: state.trench === 'N/A' ? 'N/A' : (state.trench ? 'Yes' : 'No'),
          pickupFloor: state.pickupFloor === 'N/A' ? 'N/A' : (state.pickupFloor ? 'Yes' : 'No'),
          pickupHuman: state.pickupHuman === 'N/A' ? 'N/A' : (state.pickupHuman ? 'Yes' : 'No'),
          shoot: state.shoot === 'N/A' ? 'N/A' : (state.shoot ? 'Yes' : 'No'),
          approxStorage: state.approxStorage,
          notes: state.notes
        };
        
        fetch(scriptUrl, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(dataToSubmit)
        })
        .then(() => {
          alert("Data submitted successfully!");
          // Increment match number
          const currentMatchNumber = parseInt(state.matchNumber) || 0;
          const nextMatchNumber = currentMatchNumber + 1;
          state.matchNumber = String(nextMatchNumber);
          
          // Reset all parameters (keeping name and robotStartSide and incremented matchNumber)
          state.teamNumber = '';
          state.robotOnField = true;
          state.autoScore = 0;
          state.autoClimb = 'No';
          state.autoBallsScore = 0;
          state.balls = 0;
          state.telepopBallsScore = 0;
          state.climb = 'No';
          state.trench = false;
          state.pickupFloor = false;
          state.pickupHuman = false;
          state.shoot = false;
          state.approxStorage = '0';
          state.notes = '';
          // Update inputs (keeping name and incrementing match number)
          document.getElementById('team-number').value = '';
          document.getElementById('autoBallsScored').value = '';
          document.getElementById('match-number').value = nextMatchNumber;
          document.getElementById('notes').value = '';
          // Update displays
          updateDisplay('robotOnField');
          updateDisplay('robotStartSide');
          updateDisplay('autoScore');
          updateDisplay('autoClimb');
          updateDisplay('autoBallsScore');
          updateDisplay('balls');
          updateDisplay('telepopBallsScore');
          updateDisplay('climb');
          updateDisplay('trench');
          updateDisplay('pickupFloor');
          updateDisplay('pickupHuman');
          updateDisplay('shoot');
          updateDisplay('approxStorage');
          // Clear all button active states except robotStartSide
          document.querySelectorAll('button').forEach(btn => {
            if (!btn.classList.contains('robot-start-option')) {
              btn.classList.remove('active');
            }
          });
          
          // Re-enable form
          submitBtn.disabled = false;
          submitBtn.textContent = originalBtnText;
          allInputs.forEach(el => el.disabled = false);
        })
        .catch(error => {
          alert("Error submitting: " + error);
          
          // Re-enable form on error
          submitBtn.disabled = false;
          submitBtn.textContent = originalBtnText;
          allInputs.forEach(el => el.disabled = false);
        });
      });
    </script>
  </body>
</html>
