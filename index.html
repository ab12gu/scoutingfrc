<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FRC Scouting</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="icon" type="image/x-icon" href="/static/images/scout-blue-skyblue.png">
  </head>

  <body>
    <main>
      <header class="main-header">
        <img class="app-logo" src="/static/images/final-logo.svg" alt="FRC Logo" />
        <h1>FRC Scouting</h1>
        <p class="lead">Track match performance with a quick tap — no account needed.</p>
      </header>

      <div class="match-info">
        <div class="input-row">
          <label for="team-number">Team Number:</label>
          <input type="text" id="team-number" placeholder="e.g. 1234">
        </div>
        <div class="input-row">
          <label for="match-number">Match Number:</label>
          <input type="text" id="match-number" placeholder="e.g. Q1">
        </div>
      </div>

      <div class="poll">
        <div class="poll-row">
          <span class="poll-label">Balls scored</span>
          <button type="button" class="decrement" data-key="balls">-</button>
          <span class="poll-value" id="balls">0</span>
          <button type="button" class="increment" data-key="balls">+</button>
        </div>

        <div class="poll-row">
          <span class="poll-label">Rough percentage made</span>
          <button type="button" class="decrement" data-key="rough">-</button>
          <span class="poll-value" id="rough">0</span>
          <button type="button" class="increment" data-key="rough">+</button>
        </div>

        <div class="poll-row">
          <span class="poll-label">Climb</span>
          <button type="button" class="decrement" data-key="climb">-</button>
          <span class="poll-value" id="climb">0</span>
          <button type="button" class="increment" data-key="climb">+</button>
        </div>

        <div class="poll-row">
          <span class="poll-label">Auto path</span>
          <button type="button" class="decrement" data-key="auto">-</button>
          <span class="poll-value" id="auto">0</span>
          <button type="button" class="increment" data-key="auto">+</button>
        </div>

        <div class="poll-row">
          <span class="poll-label">Trench (Y/N)</span>
          <button type="button" class="toggle" data-key="trench">Toggle</button>
          <span class="poll-value" id="trench">No</span>
        </div>

        <div class="poll-row">
          <span class="poll-label">Can pick up from floor?</span>
          <button type="button" class="toggle" data-key="pickupFloor">Toggle</button>
          <span class="poll-value" id="pickupFloor">No</span>
        </div>

        <div class="poll-row">
          <span class="poll-label">Can pick up from human player station?</span>
          <button type="button" class="toggle" data-key="pickupHuman">Toggle</button>
          <span class="poll-value" id="pickupHuman">No</span>
        </div>

        <div class="poll-row">
          <span class="poll-label">Shoot on move</span>
          <button type="button" class="toggle" data-key="shoot">Toggle</button>
          <span class="poll-value" id="shoot">No</span>
        </div>

        <div class="poll-row">
          <span class="poll-label">Storage capacity</span>
          <button type="button" class="decrement" data-key="storage">-</button>
          <span class="poll-value" id="storage">0</span>
          <button type="button" class="increment" data-key="storage">+</button>
        </div>
      </div>

      <div class="submit-section">
        <button type="button" id="submit-btn">Submit Data</button>
      </div>
    </main>

    <script>
      const state = {
        teamNumber: '',
        matchNumber: '',
        balls: 0,
        rough: 0,
        climb: 0,
        auto: 0,
        trench: false,
        pickupFloor: false,
        pickupHuman: false,
        shoot: false,
        storage: 0,
      };

      function updateDisplay(key) {
        const el = document.getElementById(key);
        if (!el) return;
        const value = state[key];
        if (key === 'rough') {
          el.textContent = value + '%';
        } else if (typeof value === 'boolean') {
          el.textContent = value ? 'Yes' : 'No';
        } else {
          el.textContent = value;
        }
      }

      function clampNumber(value, key) {
        if (key === 'rough') {
          return Math.max(0, Math.min(100, value));
        }
        return Math.max(0, value);
      }

      document.getElementById('team-number').addEventListener('input', (e) => {
        state.teamNumber = e.target.value;
      });

      document.getElementById('match-number').addEventListener('input', (e) => {
        state.matchNumber = e.target.value;
      });

      document.addEventListener('click', (event) => {
        const button = event.target.closest('button');
        if (!button) return;

        const key = button.dataset.key;
        if (!key) return;

        if (button.classList.contains('increment')) {
          const increment = key === 'rough' ? 5 : 1;
          state[key] = clampNumber(state[key] + increment, key);
        } else if (button.classList.contains('decrement')) {
          const decrement = key === 'rough' ? 5 : 1;
          state[key] = clampNumber(state[key] - decrement, key);
        } else if (button.classList.contains('toggle')) {
          state[key] = !state[key];
        }

        updateDisplay(key);
      });

      document.getElementById('submit-btn').addEventListener('click', () => {
        alert("submitted");
        // Reset all parameters
        state.teamNumber = '';
        state.matchNumber = '';
        state.balls = 0;
        state.rough = 0;
        state.climb = 0;
        state.auto = 0;
        state.trench = false;
        state.pickupFloor = false;
        state.pickupHuman = false;
        state.shoot = false;
        state.storage = 0;
        // Update inputs
        document.getElementById('team-number').value = '';
        document.getElementById('match-number').value = '';
        // Update displays
        updateDisplay('balls');
        updateDisplay('rough');
        updateDisplay('climb');
        updateDisplay('auto');
        updateDisplay('trench');
        updateDisplay('pickupFloor');
        updateDisplay('pickupHuman');
        updateDisplay('shoot');
        updateDisplay('storage');
      });
    </script>
  </body>
</html>
