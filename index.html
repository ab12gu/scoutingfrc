<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FRC Scouting</title>
    <link rel="stylesheet" href="/static/style.css?v=13" />
    <link rel="icon" type="image/x-icon" href="/static/images/scout-blue-skyblue.png">
  </head>

  <body>
    <main>
      <header class="main-header">
        <img class="app-logo" src="/static/images/final-logo.svg" alt="FRC Logo" />
        <h1>FRC Scouting</h1>
        <p class="lead">Track match performance with a quick tap — no account needed.</p>
      </header>

      <div class="match-info">
        <div class="input-row">
          <label for="team-number">Team Number:</label>
          <input type="text" id="team-number" placeholder="e.g. 1234">
        </div>
        <div class="input-row">
          <label for="match-number">Match Number:</label>
          <input type="text" id="match-number" placeholder="e.g. Q1">
        </div>
      </div>

      <div class="poll">
        <div class="poll-row">
          <span class="poll-label">Balls scored in auto</span>
          <button type="button" class="decrement" data-key="autoScore">-</button>
          <span class="poll-value" id="autoScore">0</span>
          <button type="button" class="increment" data-key="autoScore">+</button>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Auto climb</span>
          <div class="climb-buttons">
            <button type="button" class="autoClimb-option" data-value="1">1</button>
            <button type="button" class="autoClimb-option" data-value="2">2</button>
            <button type="button" class="autoClimb-option" data-value="3">3</button>
            <button type="button" class="autoClimb-option" data-value="L">L</button>
            <button type="button" class="autoClimb-option" data-value="No">No</button>
          </div>
          <span class="poll-value" id="autoClimb">No</span>
        </div>

        <div class="poll-row">
          <span class="poll-label">Balls scored in teleop</span>
          <button type="button" class="decrement" data-key="balls">-</button>
          <span class="poll-value" id="balls">0</span>
          <button type="button" class="increment" data-key="balls">+</button>
        </div>

        <div class="poll-row">
          <span class="poll-label">Balls missed in teleop</span>
          <button type="button" class="decrement" data-key="rough">-</button>
          <span class="poll-value" id="rough">0</span>
          <button type="button" class="increment" data-key="rough">+</button>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Climb</span>
          <div class="climb-buttons">
            <button type="button" class="climb-option" data-value="1">1</button>
            <button type="button" class="climb-option" data-value="2">2</button>
            <button type="button" class="climb-option" data-value="3">3</button>
            <button type="button" class="climb-option" data-value="L">L</button>
            <button type="button" class="climb-option" data-value="No">No</button>
          </div>
          <span class="poll-value" id="climb">No</span>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Can go under trench? </span>
          <div class="climb-buttons">
            <button type="button" class="toggle-option" data-key="trench" data-value="true">Yes</button>
            <button type="button" class="toggle-option" data-key="trench" data-value="false">No</button>
          </div>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Can pick up from floor?</span>
          <div class="climb-buttons">
            <button type="button" class="toggle-option" data-key="pickupFloor" data-value="true">Yes</button>
            <button type="button" class="toggle-option" data-key="pickupFloor" data-value="false">No</button>
          </div>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Can pick up from human player station?</span>
          <div class="climb-buttons">
            <button type="button" class="toggle-option" data-key="pickupHuman" data-value="true">Yes</button>
            <button type="button" class="toggle-option" data-key="pickupHuman" data-value="false">No</button>
          </div>
        </div>

        <div class="poll-row climb-row">
          <span class="poll-label">Can shoot while moving?</span>
          <div class="climb-buttons">
            <button type="button" class="toggle-option" data-key="shoot" data-value="true">Yes</button>
            <button type="button" class="toggle-option" data-key="shoot" data-value="false">No</button>
          </div>
        </div>

        <div class="poll-row">
          <span class="poll-label">Storage capacity</span>
          <button type="button" class="decrement" data-key="storage">-</button>
          <span class="poll-value" id="storage">0</span>
          <button type="button" class="increment" data-key="storage">+</button>
        </div>
      </div>

      <div class="submit-section">
        <button type="button" id="submit-btn">Submit Data</button>
      </div>
    </main>

    <script>
      const state = {
        teamNumber: '',
        matchNumber: '',
        autoScore: 0,
        autoClimb: 'No',
        balls: 0,
        rough: 0,
        climb: 'No',
        trench: false,
        pickupFloor: false,
        pickupHuman: false,
        shoot: false,
        storage: 0,
      };

      function updateDisplay(key) {
        const el = document.getElementById(key);
        const value = state[key];
        if (typeof value === 'boolean') {
          if (el) {
            el.textContent = value ? 'Yes' : 'No';
          }
          // Update toggle option button styles
          document.querySelectorAll(`.toggle-option[data-key="${key}"]`).forEach(btn => {
            const btnValue = btn.dataset.value === 'true';
            btn.classList.toggle('active', btnValue === value);
          });
        } else {
          if (el) {
            el.textContent = value;
          }
        }
        // Update climb button styles
        if (key === 'climb') {
          document.querySelectorAll('.climb-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.value === value);
          });
        }
        // Update autoClimb button styles
        if (key === 'autoClimb') {
          document.querySelectorAll('.autoClimb-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.value === value);
          });
        }
      }

      function clampNumber(value, key) {
        if (key === 'rough') {
          return Math.max(0, Math.min(100, value));
        }
        return Math.max(0, value);
      }

      document.getElementById('team-number').addEventListener('input', (e) => {
        state.teamNumber = e.target.value;
      });

      document.getElementById('match-number').addEventListener('input', (e) => {
        state.matchNumber = e.target.value;
      });

      document.addEventListener('change', (event) => {
        const checkbox = event.target;
        if (checkbox.classList.contains('toggle-checkbox')) {
          const key = checkbox.dataset.key;
          state[key] = checkbox.checked;
          updateDisplay(key);
        }
      });

      document.addEventListener('click', (event) => {
        const button = event.target.closest('button');
        if (!button) return;

        if (button.classList.contains('toggle-option')) {
          const key = button.dataset.key;
          const value = button.dataset.value === 'true';
          state[key] = value;
          updateDisplay(key);
          return;
        }

        if (button.classList.contains('climb-option')) {
          state.climb = button.dataset.value;
          updateDisplay('climb');
          return;
        }

        if (button.classList.contains('autoClimb-option')) {
          state.autoClimb = button.dataset.value;
          updateDisplay('autoClimb');
          return;
        }

        const key = button.dataset.key;
        if (!key) return;

        if (button.classList.contains('increment')) {
          const increment = key === 'rough' ? 1 : 1;
          state[key] = clampNumber(state[key] + increment, key);
        } else if (button.classList.contains('decrement')) {
          const decrement = key === 'rough' ? 1 : 1;
          state[key] = clampNumber(state[key] - decrement, key);
        }

        updateDisplay(key);
      });

      document.getElementById('submit-btn').addEventListener('click', () => {
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwELMK6enk3vwtbK0QfrG1EHVJ-N1YTmXW5fXCGzAkfzX_c_IQ107APv3nvwxNcc5Pc/exec';
        fetch(scriptUrl, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(state)
        })
        .then(() => {
          alert("Data submitted successfully!");
          // Reset all parameters
          state.teamNumber = '';
          state.matchNumber = '';
          state.autoScore = 0;
          state.autoClimb = 'No';
          state.balls = 0;
          state.rough = 0;
          state.climb = 'No';
          state.trench = false;
          state.pickupFloor = false;
          state.pickupHuman = false;
          state.shoot = false;
          state.storage = 0;
          // Update inputs
          document.getElementById('team-number').value = '';
          document.getElementById('match-number').value = '';
          // Update displays
          updateDisplay('autoScore');
          updateDisplay('autoClimb');
          updateDisplay('balls');
          updateDisplay('rough');
          updateDisplay('climb');
          updateDisplay('trench');
          updateDisplay('pickupFloor');
          updateDisplay('pickupHuman');
          updateDisplay('shoot');
          updateDisplay('storage');
        })
        .catch(error => {
          alert("Error submitting: " + error);
        });
      });
    </script>
  </body>
</html>
